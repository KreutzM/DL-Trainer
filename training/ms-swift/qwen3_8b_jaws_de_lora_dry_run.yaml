run:
  run_name: qwen3_8b_jaws_de_lora_dry_run_v1
  framework: ms-swift
  stage: sft

model:
  base_model: Qwen/Qwen3-8B
  tokenizer_name_or_path: Qwen/Qwen3-8B
  trust_remote_code: true
  max_length: 2048

dataset:
  format: openai_messages
  train_file: data/exports/qwen_sft/JAWS/DE/gold_v1/train.jsonl
  eval_file: data/exports/qwen_sft/JAWS/DE/gold_v1/eval.jsonl
  train_metadata_file: data/exports/qwen_sft/JAWS/DE/gold_v1/train.metadata.jsonl
  eval_metadata_file: data/exports/qwen_sft/JAWS/DE/gold_v1/eval.metadata.jsonl
  manifest_file: data/exports/qwen_sft/JAWS/DE/gold_v1/manifest.json

training:
  output_dir: training/ms-swift/outputs/qwen3_8b_jaws_de_lora_dry_run_v1
  logging_dir: training/ms-swift/logs/qwen3_8b_jaws_de_lora_dry_run_v1
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  lr_scheduler_type: cosine
  warmup_ratio: 0.0
  weight_decay: 0.0
  max_grad_norm: 1.0
  eval_strategy: steps
  eval_steps: 1
  save_strategy: steps
  save_steps: 1
  save_total_limit: 1
  seed: 42
  bf16: true

lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

runtime:
  report_to:
    - tensorboard
  gradient_checkpointing: true
  flash_attention: flash_attention_2
  dry_run_steps: 2
  check_only: true
