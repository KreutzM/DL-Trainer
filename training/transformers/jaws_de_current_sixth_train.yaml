run:
  run_name: jaws_de_controlled_gold_v16_current_sixth_train
  framework: transformers
  stage: lora_sft

model:
  base_model: Qwen/Qwen3-8B
  tokenizer_name_or_path: Qwen/Qwen3-8B
  trust_remote_code: true
  max_length: 1024

dataset:
  format: qwen_openai_messages
  train_file: data/exports/qwen_sft/JAWS/DE/current/train.jsonl
  eval_file: data/exports/qwen_sft/JAWS/DE/current/eval.jsonl
  train_metadata_file: data/exports/qwen_sft/JAWS/DE/current/train.metadata.jsonl
  eval_metadata_file: data/exports/qwen_sft/JAWS/DE/current/eval.metadata.jsonl
  manifest_file: data/exports/qwen_sft/JAWS/DE/current/manifest.json

training:
  output_dir: training/transformers/outputs/jaws_de_current_sixth_train
  logging_dir: training/transformers/logs/jaws_de_current_sixth_train
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  lr_scheduler_type: cosine
  warmup_ratio: 0.0
  weight_decay: 0.0
  max_grad_norm: 1.0
  eval_strategy: steps
  eval_steps: 8
  save_strategy: steps
  save_steps: 8
  save_total_limit: 3
  seed: 42
  bf16: false
  max_steps: 32
  optim: paged_adamw_8bit

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: float16

runtime:
  report_to: []
  gradient_checkpointing: true
  attention_implementation: eager
  expected_platform: windows
  expected_python_min: "3.10"
  min_cuda_devices: 1
  expected_gpu_name_substring: "3060"
  min_gpu_memory_gb: 10
  assistant_only_loss: true
  dataloader_num_workers: 0
  resume_from_checkpoint: null
