run:
  run_name: qwen3_8b_jaws_de_lora_4090_v4
  framework: transformers_peft_qlora
  stage: sft

model:
  base_model: Qwen/Qwen3-8B
  tokenizer_name_or_path: Qwen/Qwen3-8B
  trust_remote_code: true
  max_length: 1536

dataset:
  format: openai_messages
  train_file: data/exports/qwen_sft/JAWS/DE/qwen3_8b_jaws_de_lora_4090_v4_20260328/train.jsonl
  eval_file: data/exports/qwen_sft/JAWS/DE/qwen3_8b_jaws_de_lora_4090_v4_20260328/eval.jsonl
  train_metadata_file: data/exports/qwen_sft/JAWS/DE/qwen3_8b_jaws_de_lora_4090_v4_20260328/train.metadata.jsonl
  eval_metadata_file: data/exports/qwen_sft/JAWS/DE/qwen3_8b_jaws_de_lora_4090_v4_20260328/eval.metadata.jsonl
  manifest_file: data/exports/qwen_sft/JAWS/DE/qwen3_8b_jaws_de_lora_4090_v4_20260328/manifest.json

training:
  output_dir: training/transformers/outputs/qwen3_8b_jaws_de_lora_4090_v4
  logging_dir: training/transformers/logs/qwen3_8b_jaws_de_lora_4090_v4
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.00008
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.0
  max_grad_norm: 1.0
  eval_strategy: steps
  eval_steps: 25
  save_strategy: steps
  save_steps: 25
  save_total_limit: 4
  logging_steps: 5
  seed: 42
  bf16: true
  optim: paged_adamw_8bit

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

runtime:
  report_to:
    - tensorboard
  gradient_checkpointing: true
  attention_implementation: sdpa
  check_only: false
  dataloader_num_workers: 2
  assistant_only_loss: true
  max_grad_ckpt_use_reentrant: false
  expected_platform: linux
  expected_python_min: "3.10"
  min_cuda_devices: 1
  expected_gpu_name_substring: "4090"
  min_gpu_memory_gb: 20

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

inference:
  max_new_tokens: 192
  do_sample: false
  temperature: 0.0
  top_p: 1.0
