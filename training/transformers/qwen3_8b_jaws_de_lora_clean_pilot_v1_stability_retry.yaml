run:
  run_name: qwen3_8b_jaws_de_lora_clean_pilot_v1_stability_retry
  framework: transformers_peft_qlora
  stage: sft

model:
  base_model: Qwen/Qwen3-8B
  tokenizer_name_or_path: Qwen/Qwen3-8B
  trust_remote_code: true
  max_length: 1024

dataset:
  format: openai_messages
  train_file: data/exports/qwen_sft/JAWS/DE/consolidated_gold_v1_lora_clean_20260326/train.jsonl
  eval_file: data/exports/qwen_sft/JAWS/DE/consolidated_gold_v1_lora_clean_20260326/eval.jsonl
  train_metadata_file: data/exports/qwen_sft/JAWS/DE/consolidated_gold_v1_lora_clean_20260326/train.metadata.jsonl
  eval_metadata_file: data/exports/qwen_sft/JAWS/DE/consolidated_gold_v1_lora_clean_20260326/eval.metadata.jsonl
  manifest_file: data/exports/qwen_sft/JAWS/DE/consolidated_gold_v1_lora_clean_20260326/manifest.json

training:
  output_dir: training/transformers/outputs/qwen3_8b_jaws_de_lora_clean_pilot_v1_stability_retry
  logging_dir: training/transformers/logs/qwen3_8b_jaws_de_lora_clean_pilot_v1_stability_retry
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0001
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  eval_strategy: "no"
  eval_steps: 1000
  save_strategy: steps
  save_steps: 10
  save_total_limit: 2
  logging_steps: 2
  seed: 42
  bf16: true
  optim: paged_adamw_8bit
  max_steps: 50

lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

runtime:
  report_to:
    - tensorboard
  gradient_checkpointing: true
  attention_implementation: sdpa
  check_only: false
  dataloader_num_workers: 0
  assistant_only_loss: true
  max_grad_ckpt_use_reentrant: false

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

inference:
  max_new_tokens: 96
  do_sample: false
  temperature: 0.0
  top_p: 1.0
